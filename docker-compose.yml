services:
  dicky_todolist:
    image: postgres:16-alpine
    container_name: dicky_todolist
    environment:
      POSTGRES_DB: dicky_todolist
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dicky_todolist"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dicky_todolist_backend
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5170
      ConnectionStrings__DefaultConnection: Host=dicky_todolist;Port=5432;Database=dicky_todolist;Username=postgres;Password=postgres
    depends_on:
      dicky_todolist:
        condition: service_healthy
    ports:
      - "5170:5170"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5170
    container_name: dicky_todolist_frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
